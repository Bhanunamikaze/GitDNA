name: Generate Data Packs

on:
  schedule:
    - cron: "23 2 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Regenerate data packs
        run: |
          node scripts/generate_types_json.js
          node scripts/generate_readme_cards.js
          node scripts/generate_profile_pages.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dna/types_100.json data/cards u
          if git diff --cached --quiet; then
            echo "No data pack changes."
            exit 0
          fi
          git commit -m "chore(data): refresh generated packs"
          git push
