name: Generate README Cards

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate cards and profile pages
        run: |
          node scripts/generate_readme_cards.js
          node scripts/generate_profile_pages.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cards u
          if git diff --cached --quiet; then
            echo "No card changes."
            exit 0
          fi
          git commit -m "chore(cards): refresh readme and profile card assets"
          git push
