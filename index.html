<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitDNA | Developer Identity Scanner</title>
    <meta
      name="description"
      content="Scan your GitHub and reveal your developer DNA with an interactive constellation experience."
    />
    <meta property="og:title" content="GitDNA | Developer Identity Scanner" />
    <meta
      property="og:description"
      content="Your GitHub commit history has a personality. Scan and reveal your developer DNA."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="./assets/og-default.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GitDNA | Developer Identity Scanner" />
    <meta
      name="twitter:description"
      content="Interactive GitHub DNA scanner with constellation visualization and shareable personality badge."
    />
    <meta name="twitter:image" content="./assets/og-default.svg" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              cosmic: {
                950: "#050B16",
                900: "#0B1626",
                800: "#12243B",
                700: "#1D3654"
              },
              neon: {
                cyan: "#22D3EE",
                teal: "#14B8A6",
                violet: "#8B5CF6",
                amber: "#F59E0B"
              }
            },
            boxShadow: {
              glow: "0 0 24px rgba(34,211,238,0.28)",
              soft: "0 10px 34px rgba(15,23,42,0.18)"
            },
            fontFamily: {
              display: ["Space Grotesk", "ui-sans-serif", "system-ui"],
              body: ["IBM Plex Sans", "ui-sans-serif", "system-ui"],
              mono: ["JetBrains Mono", "ui-monospace", "SFMono-Regular"]
            }
          }
        }
      };
    </script>
    <link rel="stylesheet" href="./src/app.css" />
  </head>
  <body class="font-body bg-slate-950 text-slate-100 min-h-screen">
    <div id="root"></div>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
