  <rect x="110" y="455" width="170" height="48" rx="10" fill="#0f766e" />
  <text x="154" y="486" fill="#fff" font-size="20" font-family="IBM Plex Sans, Arial, sans-serif" font-weight="700">Analyze</text>
  <rect x="295" y="455" width="250" height="48" rx="10" fill="#334155" />
  <text x="326" y="486" fill="#fff" font-size="20" font-family="IBM Plex Sans, Arial, sans-serif" font-weight="700">Try Demo Profile</text>

  <rect x="650" y="220" width="550" height="420" rx="18" fill="#ffffff" stroke="#dbe3ec" />
  <text x="680" y="270" fill="#0f172a" font-size="28" font-family="Space Grotesk, Arial, sans-serif" font-weight="700">Instant Demo Loaded</text>
  <text x="680" y="314" fill="#1d4ed8" font-size="22" font-family="IBM Plex Sans, Arial, sans-serif">Disciplined Architect</text>
  <rect x="680" y="340" width="220" height="16" rx="8" fill="#e2e8f0" />
  <rect x="680" y="340" width="174" height="16" rx="8" fill="#0f766e" />
  <text x="912" y="355" fill="#0f172a" font-size="16" font-family="IBM Plex Sans, Arial, sans-serif">79%</text>
  <rect x="680" y="380" width="480" height="22" rx="8" fill="#f1f5f9" />
  <rect x="680" y="414" width="420" height="22" rx="8" fill="#f1f5f9" />
  <rect x="680" y="448" width="450" height="22" rx="8" fill="#f1f5f9" />
  <rect x="680" y="482" width="390" height="22" rx="8" fill="#f1f5f9" />
  <rect x="680" y="530" width="210" height="44" rx="10" fill="#0f766e" />
  <text x="718" y="558" fill="#fff" font-size="20" font-family="IBM Plex Sans, Arial, sans-serif" font-weight="700">Star on GitHub</text>
