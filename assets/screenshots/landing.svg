<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="GitDNA landing screenshot">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfeff" />
      <stop offset="50%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#fff7ed" />
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f766e" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)" />
  <rect x="80" y="70" width="1120" height="120" rx="20" fill="url(#header)" />
  <text x="120" y="132" fill="#fff" font-size="52" font-family="Space Grotesk, Arial, sans-serif" font-weight="700">GitDNA</text>
  <text x="120" y="168" fill="#e2e8f0" font-size="24" font-family="IBM Plex Sans, Arial, sans-serif">Discover your developer archetype from public GitHub behavior</text>

  <rect x="80" y="220" width="540" height="420" rx="18" fill="#ffffff" stroke="#dbe3ec" />
  <text x="110" y="270" fill="#0f172a" font-size="30" font-family="Space Grotesk, Arial, sans-serif" font-weight="700">Analyze Profile</text>
  <rect x="110" y="300" width="480" height="54" rx="10" fill="#f8fafc" stroke="#dbe3ec" />
  <text x="128" y="335" fill="#64748b" font-size="20" font-family="IBM Plex Sans, Arial, sans-serif">GitHub Username</text>
  <rect x="110" y="372" width="480" height="54" rx="10" fill="#f8fafc" stroke="#dbe3ec" />
