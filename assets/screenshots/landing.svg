<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="GitDNA landing screenshot">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050b16" />
      <stop offset="55%" stop-color="#0b1626" />
      <stop offset="100%" stop-color="#1a1f4b" />
    </linearGradient>
    <radialGradient id="nebulaA" cx="20%" cy="18%" r="60%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.28" />
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="nebulaB" cx="84%" cy="20%" r="56%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.28" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1626" stop-opacity="0.92" />
      <stop offset="100%" stop-color="#13253d" stop-opacity="0.82" />
    </linearGradient>
    <linearGradient id="btn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#14b8a6" />
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#nebulaA)"/>
  <rect width="1280" height="720" fill="url(#nebulaB)"/>

  <g opacity="0.45">
    <circle cx="130" cy="80" r="2" fill="#94a3b8"/>
    <circle cx="260" cy="140" r="1.5" fill="#94a3b8"/>
    <circle cx="1120" cy="90" r="2" fill="#c4b5fd"/>
    <circle cx="980" cy="120" r="1.5" fill="#94a3b8"/>
    <circle cx="640" cy="48" r="1.6" fill="#67e8f9"/>
  </g>

  <rect x="72" y="52" width="1136" height="616" rx="24" fill="url(#panel)" stroke="#334155" stroke-opacity="0.6"/>

  <text x="120" y="118" fill="#67e8f9" font-size="16" letter-spacing="2" font-family="IBM Plex Sans, Arial, sans-serif" font-weight="700">GITDNA SCANNER</text>
  <text x="120" y="176" fill="#f8fafc" font-size="64" font-family="Space Grotesk, Arial, sans-serif" font-weight="700">Your GitHub commit history</text>
  <text x="120" y="238" fill="#f8fafc" font-size="64" font-family="Space Grotesk, Arial, sans-serif" font-weight="700">has a personality.</text>
  <text x="120" y="282" fill="#94a3b8" font-size="28" font-family="IBM Plex Sans, Arial, sans-serif">Scan your GitHub and reveal your developer DNA.</text>

  <rect x="120" y="332" width="520" height="64" rx="12" fill="#0f172a" stroke="#475569"/>
  <text x="146" y="372" fill="#64748b" font-size="24" font-family="IBM Plex Sans, Arial, sans-serif">GitHub Username</text>

  <rect x="120" y="416" width="322" height="64" rx="12" fill="url(#btn)"/>
  <text x="168" y="458" fill="#042029" font-size="24" font-family="IBM Plex Sans, Arial, sans-serif" font-weight="700">Scan My GitHub DNA</text>

  <rect x="460" y="416" width="182" height="64" rx="12" fill="#0f172a" stroke="#64748b"/>
  <text x="518" y="458" fill="#e2e8f0" font-size="24" font-family="IBM Plex Sans, Arial, sans-serif" font-weight="700">Try Demo</text>

  <g transform="translate(840,188)">
    <circle cx="180" cy="166" r="116" fill="none" stroke="#22d3ee" stroke-opacity="0.35" stroke-width="2" stroke-dasharray="6 8"/>
    <circle cx="180" cy="166" r="90" fill="none" stroke="#14b8a6" stroke-opacity="0.42" stroke-width="2" stroke-dasharray="6 8"/>
    <circle cx="180" cy="166" r="66" fill="none" stroke="#f59e0b" stroke-opacity="0.34" stroke-width="2" stroke-dasharray="6 8"/>
    <circle cx="180" cy="166" r="50" fill="#14b8a6"/>
    <text x="180" y="174" text-anchor="middle" fill="#ecfeff" font-size="18" font-family="JetBrains Mono, monospace" font-weight="700">DNA Core</text>
    <circle cx="108" cy="90" r="4" fill="#67e8f9"/>
    <circle cx="258" cy="106" r="4" fill="#c4b5fd"/>
    <circle cx="224" cy="256" r="4" fill="#86efac"/>
  </g>

  <rect x="120" y="536" width="180" height="34" rx="17" fill="#0b1f35" stroke="#1e3a5f"/>
  <text x="154" y="559" fill="#bae6fd" font-size="16" font-family="IBM Plex Sans, Arial, sans-serif" font-weight="700">100 DNA Types</text>
  <rect x="312" y="536" width="244" height="34" rx="17" fill="#0b1f35" stroke="#1e3a5f"/>
  <text x="346" y="559" fill="#bae6fd" font-size="16" font-family="IBM Plex Sans, Arial, sans-serif" font-weight="700">Interactive Constellation</text>
</svg>
