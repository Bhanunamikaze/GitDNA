<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitDNA Codex - 100 DNA Types</title>
    <meta
      name="description"
      content="Explore all 100 GitDNA types with rarity, aliases, flavor text, and visual archetype markers."
    />
    <meta property="og:title" content="GitDNA Codex - 100 DNA Types" />
    <meta
      property="og:description"
      content="Browse every GitDNA type and discover what each archetype+modifier combination means."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="./assets/og-default.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GitDNA Codex - 100 DNA Types" />
    <meta
      name="twitter:description"
      content="The full catalog of 100 deterministic developer DNA types."
    />
    <meta name="twitter:image" content="./assets/og-default.svg" />
    <link rel="stylesheet" href="./codex.css" />
  </head>
  <body>
    <div class="aurora" aria-hidden="true"></div>

    <header class="codex-header">
      <a class="brand" href="./index.html">← Back to Analyzer</a>
      <h1>DNA Codex</h1>
      <p>Browse all 100 type combinations and inspect their identity traits.</p>
    </header>

    <main class="codex-layout">
      <section class="panel controls">
        <h2>Find a Type</h2>
        <label for="codex-search">Search</label>
        <input
          id="codex-search"
          type="search"
          placeholder="Night Architect, Pathfinder, Burst..."
          autocomplete="off"
        />

        <label for="codex-rarity">Rarity</label>
        <select id="codex-rarity">
          <option value="all">All rarities</option>
          <option value="Common">Common</option>
          <option value="Rare">Rare</option>
          <option value="Legendary">Legendary</option>
          <option value="Mythic">Mythic</option>
        </select>

        <p id="codex-count" class="hint"></p>
      </section>

      <section class="panel list-panel">
        <div id="codex-grid" class="codex-grid"></div>
      </section>

      <section class="panel detail-panel" id="detail-panel" aria-live="polite">
        <h2 id="detail-name">Select a DNA type</h2>
        <p id="detail-alias" class="alias"></p>
        <div id="detail-character" class="character"></div>
        <p id="detail-meta" class="meta"></p>
        <p id="detail-flavor" class="flavor"></p>
        <p id="detail-rarity" class="rarity-pill"></p>
      </section>
    </main>

    <script type="module" src="./src/codexPage.js"></script>
  </body>
</html>
